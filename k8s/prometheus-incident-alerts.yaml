apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-incident-alerts
  namespace: soroscan
data:
  incident-alerts.yml: |
    groups:
      # Event Ingestion Alerts
      - name: event_ingestion
        interval: 1m
        rules:
          - alert: EventIngestionLagHigh
            expr: |
              (
                time() - max(event_last_ingested_timestamp)
              ) > 300
            for: 5m
            labels:
              severity: high
              component: ingestion
              playbook: event-ingestion-lag
            annotations:
              summary: "Event ingestion lag is high"
              description: "Events are delayed by {{ $value | humanizeDuration }}. Last event ingested {{ $value }}s ago."
              runbook_url: "https://docs.soroscan.io/incident-response/event-ingestion-lag"
              auto_remediation: "scripts/incident-response/auto-remediate-ingestion-lag.sh"
          
          - alert: CeleryQueueBacklog
            expr: celery_queue_length > 10000
            for: 5m
            labels:
              severity: high
              component: celery
              playbook: event-ingestion-lag
            annotations:
              summary: "Celery queue backlog is high"
              description: "Celery queue has {{ $value }} pending tasks (threshold: 10000)"
              runbook_url: "https://docs.soroscan.io/incident-response/event-ingestion-lag"
              auto_remediation: "scripts/incident-response/auto-remediate-ingestion-lag.sh"
          
          - alert: CeleryWorkerDown
            expr: up{job="celery-worker"} == 0
            for: 2m
            labels:
              severity: critical
              component: celery
            annotations:
              summary: "Celery worker is down"
              description: "Celery worker {{ $labels.instance }} has been down for 2 minutes"
              runbook_url: "https://docs.soroscan.io/incident-response/event-ingestion-lag"
      
      # Webhook Delivery Alerts
      - name: webhook_delivery
        interval: 1m
        rules:
          - alert: WebhookFailureRateHigh
            expr: |
              (
                rate(webhook_delivery_failed_total[5m])
                /
                rate(webhook_delivery_total[5m])
              ) > 0.10
            for: 5m
            labels:
              severity: medium
              component: webhooks
              playbook: webhook-delivery-failures
            annotations:
              summary: "High webhook failure rate detected"
              description: "Webhook failure rate is {{ $value | humanizePercentage }} (threshold: 10%)"
              runbook_url: "https://docs.soroscan.io/incident-response/webhook-delivery-failures"
              auto_remediation: "scripts/incident-response/auto-remediate-webhook-failures.sh"
          
          - alert: WebhookFailureBurst
            expr: |
              (
                rate(webhook_delivery_failed_total[5m])
                /
                rate(webhook_delivery_failed_total[1h] offset 1h)
              ) > 5
            for: 2m
            labels:
              severity: medium
              component: webhooks
              playbook: webhook-delivery-failures
            annotations:
              summary: "Webhook failure burst detected"
              description: "Webhook failures increased by {{ $value }}x compared to 1 hour ago"
              runbook_url: "https://docs.soroscan.io/incident-response/webhook-delivery-failures"
              auto_remediation: "scripts/incident-response/auto-remediate-webhook-failures.sh"
          
          - alert: WebhookRetryQueueHigh
            expr: celery_queue_length{queue="webhook_retry"} > 5000
            for: 10m
            labels:
              severity: medium
              component: webhooks
            annotations:
              summary: "Webhook retry queue is high"
              description: "Webhook retry queue has {{ $value }} pending retries"
              runbook_url: "https://docs.soroscan.io/incident-response/webhook-delivery-failures"
      
      # Database Connection Pool Alerts
      - name: database_connections
        interval: 30s
        rules:
          - alert: DatabaseConnectionPoolNearLimit
            expr: |
              (
                sum(pg_stat_activity_count{state!="idle"})
                /
                pg_settings_max_connections
              ) > 0.80
            for: 5m
            labels:
              severity: high
              component: database
              playbook: db-connection-pool-exhausted
            annotations:
              summary: "Database connection pool near limit"
              description: "Database connections at {{ $value | humanizePercentage }} of max (threshold: 80%)"
              runbook_url: "https://docs.soroscan.io/incident-response/db-connection-pool-exhausted"
              auto_remediation: "scripts/incident-response/auto-remediate-db-connections.sh"
          
          - alert: DatabaseConnectionPoolExhausted
            expr: |
              (
                sum(pg_stat_activity_count{state!="idle"})
                /
                pg_settings_max_connections
              ) > 0.95
            for: 1m
            labels:
              severity: critical
              component: database
              playbook: db-connection-pool-exhausted
            annotations:
              summary: "Database connection pool exhausted"
              description: "Database connections at {{ $value | humanizePercentage }} of max (threshold: 95%)"
              runbook_url: "https://docs.soroscan.io/incident-response/db-connection-pool-exhausted"
              auto_remediation: "scripts/incident-response/auto-remediate-db-connections.sh"
          
          - alert: DatabaseIdleInTransactionHigh
            expr: pg_stat_activity_count{state="idle in transaction"} > 10
            for: 5m
            labels:
              severity: medium
              component: database
              playbook: db-connection-pool-exhausted
            annotations:
              summary: "High number of idle in transaction connections"
              description: "{{ $value }} connections are idle in transaction (threshold: 10)"
              runbook_url: "https://docs.soroscan.io/incident-response/db-connection-pool-exhausted"
              auto_remediation: "scripts/incident-response/auto-remediate-db-connections.sh"
          
          - alert: DatabaseSlowQueries
            expr: pg_stat_activity_max_tx_duration > 30
            for: 5m
            labels:
              severity: medium
              component: database
            annotations:
              summary: "Slow database queries detected"
              description: "Longest running query has been active for {{ $value }}s"
              runbook_url: "https://docs.soroscan.io/incident-response/db-connection-pool-exhausted"
      
      # RPC Endpoint Alerts
      - name: rpc_endpoint
        interval: 30s
        rules:
          - alert: RPCEndpointDown
            expr: up{job="rpc-endpoint"} == 0
            for: 2m
            labels:
              severity: high
              component: rpc
              playbook: rpc-endpoint-unavailable
            annotations:
              summary: "RPC endpoint is down"
              description: "RPC endpoint {{ $labels.instance }} has been down for 2 minutes"
              runbook_url: "https://docs.soroscan.io/incident-response/rpc-endpoint-unavailable"
              auto_remediation: "scripts/incident-response/auto-remediate-rpc-failure.sh"
          
          - alert: RPCEndpointSlow
            expr: |
              histogram_quantile(0.95,
                rate(rpc_request_duration_seconds_bucket[5m])
              ) > 5
            for: 5m
            labels:
              severity: medium
              component: rpc
              playbook: rpc-endpoint-unavailable
            annotations:
              summary: "RPC endpoint responding slowly"
              description: "RPC p95 latency is {{ $value }}s (threshold: 5s)"
              runbook_url: "https://docs.soroscan.io/incident-response/rpc-endpoint-unavailable"
          
          - alert: RPCErrorRateHigh
            expr: |
              (
                rate(rpc_requests_failed_total[5m])
                /
                rate(rpc_requests_total[5m])
              ) > 0.10
            for: 5m
            labels:
              severity: high
              component: rpc
              playbook: rpc-endpoint-unavailable
            annotations:
              summary: "High RPC error rate"
              description: "RPC error rate is {{ $value | humanizePercentage }} (threshold: 10%)"
              runbook_url: "https://docs.soroscan.io/incident-response/rpc-endpoint-unavailable"
              auto_remediation: "scripts/incident-response/auto-remediate-rpc-failure.sh"
          
          - alert: RPCRateLimitHit
            expr: rate(rpc_requests_rate_limited_total[5m]) > 0
            for: 5m
            labels:
              severity: medium
              component: rpc
            annotations:
              summary: "RPC rate limit being hit"
              description: "RPC requests are being rate limited at {{ $value }} requests/s"
              runbook_url: "https://docs.soroscan.io/incident-response/rpc-endpoint-unavailable"
